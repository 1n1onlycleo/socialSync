name: Daily Instagram Thought

on:
  workflow_dispatch:
  schedule:
    - cron: "30 1 * * *"

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run post job
        env:
          VERTICAL: ${{ secrets.VERTICAL }}
          BRAND_NAME: ${{ secrets.BRAND_NAME }}
          TIMEZONE: ${{ secrets.TIMEZONE }}
          DAILY_POST_CRON: ${{ secrets.DAILY_POST_CRON }}
          DRY_RUN: ${{ secrets.DRY_RUN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          INSTAGRAM_BUSINESS_ACCOUNT_ID: ${{ secrets.INSTAGRAM_BUSINESS_ACCOUNT_ID }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
        run: npm run run:once

